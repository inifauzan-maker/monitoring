name: Deploy Produksi

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch yang akan dideploy
        required: true
        default: main
        type: string
      jalankan_seeder:
        description: Jalankan db:seed --force setelah migrate
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-produksi
  cancel-in-progress: false

env:
  BRANCH_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
  JALANKAN_SEEDER: ${{ github.event_name == 'workflow_dispatch' && inputs.jalankan_seeder || 'false' }}

jobs:
  validasi:
    name: Validasi Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_DEPLOY }}

      - name: Siapkan PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          extensions: bcmath, ctype, curl, dom, fileinfo, mbstring, openssl, pdo_sqlite, sqlite3, tokenizer, xml

      - name: Siapkan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependency PHP
        run: composer install --no-interaction --prefer-dist

      - name: Install dependency frontend
        run: npm ci

      - name: Siapkan environment test
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Jalankan test
        run: php artisan test

      - name: Build asset
        run: npm run build

      - name: Arsipkan asset build
        run: tar -czf build-artifact.tar.gz -C public build

      - name: Upload artifact build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build-artifact.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy ke Server
    runs-on: ubuntu-latest
    needs: validasi
    environment: production

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_DEPLOY }}

      - name: Unduh artifact build
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: .

      - name: Konfigurasi SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Jalankan deploy di server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x skrip/deploy_produksi.sh && ./skrip/deploy_produksi.sh '${{ env.BRANCH_DEPLOY }}' '${{ env.JALANKAN_SEEDER }}'"

      - name: Baca public path dari server
        id: public_path
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          TARGET_PUBLIC_PATH=$(ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && (grep -E '^APP_PUBLIC_PATH=' .env | tail -n1 | cut -d= -f2- | tr -d '\r\"' || true)")
          TARGET_PUBLIC_PATH="${TARGET_PUBLIC_PATH:-public}"
          echo "nilai=$TARGET_PUBLIC_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload asset build ke server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          TARGET_PUBLIC_PATH: ${{ steps.public_path.outputs.nilai }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH/$TARGET_PUBLIC_PATH' && rm -rf '$DEPLOY_PATH/$TARGET_PUBLIC_PATH/build'"
          scp -P "$DEPLOY_PORT" build-artifact.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/build-artifact.tar.gz"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && tar -xzf build-artifact.tar.gz -C '$TARGET_PUBLIC_PATH' && rm -f build-artifact.tar.gz"

      - name: Verifikasi health check
        env:
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          if [ -n "${DEPLOY_HEALTHCHECK_URL:-}" ]; then
            curl --fail --silent --show-error "$DEPLOY_HEALTHCHECK_URL"
          else
            echo "DEPLOY_HEALTHCHECK_URL kosong, verifikasi health check dilewati."
          fi
